:root{--bg:#0A0A0E;--s1:#121216;--s2:#1A1A20;--s3:#24242C;--acc:#E8553A;--acc2:#2CB67D;--acc3:#7F5AF0;--acc4:#FFD369;--tx:#EAEAEA;--txd:#8A8A96;--txm:#50505C;--brd:#222230;--font:'Outfit',sans-serif;--serif:'Playfair Display',serif;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--s3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 10px rgba(232,85,58,.4)}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:var(--tx);-webkit-user-select:none;user-select:none}
button:active{transform:scale(.97)}
img{display:block}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.app{max-width:430px;margin:0 auto;position:relative;padding-bottom:calc(72px + var(--safe-b));min-height:100dvh}
.header{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,14,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:3px;color:var(--acc)}
.tag{font-size:10px;color:var(--txm);letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.lang-btn{border:1px solid var(--brd)!important;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;color:var(--txd);letter-spacing:1px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,14,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;justify-content:space-around;padding:6px 0 calc(10px + var(--safe-b));border-top:1px solid var(--brd);z-index:100}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:400;color:var(--txm);padding:6px 16px;transition:color .2s;position:relative}
.tb.on{color:var(--acc);font-weight:600}
.tb.on::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--acc);border-radius:1px}
.tb svg{width:22px;height:22px}
.page{padding:0 16px 16px;min-height:72vh}
.card{background:var(--s1);border-radius:20px;padding:22px;border:1px solid var(--brd)}
.csm{background:var(--s1);border-radius:14px;padding:16px;border:1px solid var(--brd)}
.hid{display:none!important}
.fi{animation:fi .35s ease-out both}
</style>
</head>

  document.getElementById('bar').innerHTML=[

  ].map(x=>`<button class="tb ${tb===x.id?'on':''}" onclick="stb('${x.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${x.sv}</svg><span>${t.tabs[x.id]}</span></button>`).join('');

  const pg=document.getElementById('pg');
  if(tb==='calc')renderCalc(pg,t);

}

    <div style="font-size:12px;color:var(--txd);margin-bottom:8px;font-weight:500">${ln==='ru'?'Цель':'Goal'}</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">${glKeys.map(g=>`<button style="flex:1;padding:10px 0;border-radius:20px;font-size:12px;font-weight:${fm.gl===g?600:400};background:${fm.gl===g?glCols[g]:'transparent'};color:${fm.gl===g?'#0A0A0E':'var(--txd)'};transition:all .25s" onclick="fm.gl='${g}';render()">${t.gl[g]}</button>`).join('')}</div>
    <button style="width:100%;padding:14px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:15px;font-weight:700;font-family:var(--font);letter-spacing:.5px;cursor:pointer" onclick="doCalc()">${t.go}</button>
  </div>
  ${res?`<div class="card" style="margin-top:16px;animation:su .4s ease-out both">
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:11px;color:var(--txm);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${t.dl}</div>
      <div style="font-size:52px;font-weight:800;font-family:var(--serif);color:var(--acc);line-height:1">${res.kc}</div>
      <div style="font-size:13px;color:var(--txd);margin-top:4px">${t.kc}</div>
    </div>
    <div style="display:flex;gap:8px">
      ${[{l:t.p,v:res.p,cl:'var(--acc3)'},{l:t.f,v:res.f,cl:'var(--acc)'},{l:t.c,v:res.c,cl:'var(--acc2)'}].map(x=>`<div style="flex:1;background:var(--s2);border-radius:14px;padding:14px 8px;text-align:center;border-top:3px solid ${x.cl}"><div style="font-size:22px;font-weight:700;font-family:var(--serif)">${x.v}<span style="font-size:12px;font-weight:400;color:var(--txd)">${t.g}</span></div><div style="font-size:10px;color:var(--txd);margin-top:4px;text-transform:uppercase;letter-spacing:1px">${x.l}</div></div>`).join('')}
    </div>
  </div>`:''}</div>`;
}

function doCalc(){
  const{g,age,wt,ht,act,gl}=fm;
  let bmr=g==='m'?10*wt+6.25*ht-5*age+5:10*wt+6.25*ht-5*age-161;
  const m={sed:1.2,light:1.375,mod:1.55,high:1.725,ext:1.9};
  let td=Math.round(bmr*m[act]);
  let kc=gl==='lose'?td-400:gl==='gain'?td+350:td;
  let p=gl==='gain'?Math.round(wt*2):gl==='lose'?Math.round(wt*1.8):Math.round(wt*1.5);
  let f=Math.round(kc*.25/9);
  let c=Math.round((kc-p*4-f*9)/4);
  res={kc,p,f,c};render();
}
