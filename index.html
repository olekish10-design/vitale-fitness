img{display:block}

.logo{font-family:var(--head);font-size:32px;font-weight:400;letter-spacing:4px;color:var(--tx);line-height:1}
.tag{font-family:var(--cond);font-size:9px;color:var(--txm);letter-spacing:3px;margin-top:1px;text-transform:uppercase}
.lang-btn{border:1px solid var(--txm)!important;padding:4px 10px;font-family:var(--cond);font-size:11px;font-weight:700;color:var(--txd);letter-spacing:2px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(0,0,0,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:8px 0 calc(10px + var(--safe-b));border-top:1px solid var(--brd);z-index:100}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--cond);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txm);padding:4px 14px;transition:color .2s;position:relative}
.tb.on{color:var(--tx)}
.tb.on::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--tx)}
.tb svg{width:20px;height:20px}
.page{padding:0 16px 16px;min-height:72vh}
.card{background:var(--s1);border:1px solid var(--brd);padding:22px}
.csm{background:var(--s1);border:1px solid var(--brd);padding:16px}
.fi{animation:fi .3s ease-out both}
.sec-title{font-family:var(--head);font-size:14px;letter-spacing:3px;margin-bottom:12px;color:var(--txd)}
.ex-anim{width:44px;height:44px;background:var(--s2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-anim svg{width:30px;height:30px}
.loc-tog{display:flex;border:1px solid var(--brd);margin-bottom:14px}
.loc-tog button{flex:1;padding:9px 0;font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txm);transition:all .2s;border-right:1px solid var(--brd)}
.loc-tog button:last-child{border-right:none}
.loc-tog button.on{background:var(--tx);color:var(--bg)}
.big-num{font-family:var(--head);font-size:64px;line-height:1;letter-spacing:2px}
</style>

function renderCalc(pg,t){

    ${[{k:'age',l:t.age,mn:14,mx:80},{k:'wt',l:t.wt,mn:35,mx:200},{k:'ht',l:t.ht,mn:120,mx:220}].map(x=>`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-family:var(--cond);font-size:11px;color:var(--txd);letter-spacing:2px">${x.l}</span><span style="font-family:var(--head);font-size:24px">${fm[x.k]}</span></div><input type="range" min="${x.mn}" max="${x.mx}" value="${fm[x.k]}" oninput="fm.${x.k}=+this.value;render()"></div>`).join('')}

    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">${ak.map(a=>`<button style="padding:7px 14px;font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:1px;border:1px solid ${fm.act===a?'#fff':'var(--brd)'};${fm.act===a?'background:#fff;color:#000':'color:var(--txd)'}" onclick="fm.act='${a}';render()">${t.act[a]}</button>`).join('')}</div>

    <button style="width:100%;padding:14px;background:#fff;color:#000;font-family:var(--head);font-size:18px;letter-spacing:3px" onclick="doCalc()">${t.go}</button>
  </div>
  ${res?`<div class="card" style="margin-top:2px;animation:su .4s both;text-align:center"><div style="font-family:var(--cond);font-size:10px;color:var(--txm);letter-spacing:3px;margin-bottom:8px">${t.dl}</div><div class="big-num">${res.kc}</div><div style="font-family:var(--cond);font-size:12px;color:var(--txd);letter-spacing:2px;margin-bottom:16px">${t.kc}</div><div style="display:flex;gap:2px">${[{l:t.p,v:res.p},{l:t.f,v:res.f},{l:t.c,v:res.c}].map(x=>`<div style="flex:1;background:var(--s2);border:1px solid var(--brd);padding:14px 6px;text-align:center"><div style="font-family:var(--head);font-size:28px">${x.v}<span style="font-size:14px;color:var(--txd)">${t.g}</span></div><div style="font-family:var(--cond);font-size:9px;color:var(--txm);letter-spacing:2px;margin-top:4px">${x.l}</div></div>`).join('')}</div></div>`:''}</div>`;
}
function doCalc(){const{g,age,wt,ht,act,gl}=fm;let b=g==='m'?10*wt+6.25*ht-5*age+5:10*wt+6.25*ht-5*age-161;const m={sed:1.2,light:1.375,mod:1.55,high:1.725,ext:1.9};let td=Math.round(b*m[act]);let kc=gl==='lose'?td-400:gl==='gain'?td+350:td;let p=gl==='gain'?Math.round(wt*2):gl==='lose'?Math.round(wt*1.8):Math.round(wt*1.5);let f=Math.round(kc*.25/9);let c=Math.round((kc-p*4-f*9)/4);res={kc,p,f,c};render()}

    </div></div>`;
