<style>
:root{--bg:#050508;--s1:#0c0c10;--s2:#141418;--s3:#1c1c22;--tx:#fff;--txd:#999;--txm:#555;--brd:#1a1a22;--teal:#2dd4a8;--red:#ff4444;--font:'Barlow',sans-serif;--head:'Bebas Neue',sans-serif;--cond:'Barlow Condensed',sans-serif;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:#333;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#fff;cursor:pointer}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:var(--tx)}
button:active{opacity:.8}
img{display:block}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes squat{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.78) translateY(6px)}}
@keyframes pushup{0%,100%{transform:rotate(0)}50%{transform:rotate(-6deg) translateY(3px)}}
@keyframes plank{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes run{0%,100%{transform:translateX(0)}50%{transform:translateX(3px) scaleX(-1)}}
@keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes stretch{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.08)}}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.app{max-width:430px;margin:0 auto;position:relative;padding-bottom:calc(70px + var(--safe-b));min-height:100dvh}
.hdr{padding:14px 18px 8px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(5,5,8,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--brd)}
.logo{font-family:var(--head);font-size:28px;letter-spacing:4px}
.lbtn{border:1px solid #333!important;padding:4px 10px;font-family:var(--cond);font-size:11px;font-weight:700;color:var(--txd);letter-spacing:2px}
.tbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(5,5,8,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;justify-content:space-around;padding:6px 0 calc(8px + var(--safe-b));border-top:1px solid var(--brd);z-index:100}
.tbn{display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--txm);padding:4px 12px;position:relative}
.tbn.on{color:var(--teal)}
.tbn svg{width:20px;height:20px}
.pg{padding:0 14px 14px;min-height:72vh}
.fi{animation:fi .3s ease-out both}
.card{background:var(--s1);border:1px solid var(--brd);padding:20px}
.csm{background:var(--s1);border:1px solid var(--brd);padding:16px}
/* Photo cards */
.pcard{position:relative;width:100%;border-radius:12px;overflow:hidden;display:block;text-align:left;margin-bottom:10px}
.pcard img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.pcard .overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(0,0,0,.7) 40%,transparent 100%)}
.pcard .ptext{position:relative;z-index:2;padding:20px;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.pcard .ptitle{font-family:var(--head);font-size:22px;letter-spacing:2px;line-height:1.1;margin-bottom:4px}
.pcard .psub{font-size:12px;color:rgba(255,255,255,.7)}
.pcard .pborder{position:absolute;top:0;left:0;bottom:0;width:4px;z-index:3}
/* Exercise anim */
.exan{width:44px;height:44px;background:var(--s2);border:1px solid var(--brd);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exan svg{width:28px;height:28px}
.stitle{font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:3px;color:var(--txd);margin-bottom:10px}
</style>
</head>

function ga(name){const n=name.toLowerCase();if(n.match(/присед|squat|выпад|lunge|мост|bridge|goblet|румын|roman|носки|calf|ногам|leg.*press/))return A.sq;if(n.match(/отжим|push|жим|bench|press|разводка|fly|пулов|pullover|бабочк|pec.*deck/))return A.pu;if(n.match(/планк|plank|поза|pose|собака|dog|воин|warrior|кошка|cat|шаваса|savas/))return A.pl;if(n.match(/берпи|burp|прыж|jump|спринт|sprint|бокс|box|табат|tabat|скалолаз|climb|трастер|thruster/))return A.jp;if(n.match(/бег|run|jog|шаг|step|марш|march|ходь|walk|эллипс|ellip|дорож|treadmill|велотренаж|bike|гребн|row.*маш|row.*mach|степпер|stepper|плаван|swim|кардио|cardio/))return A.rn;if(n.match(/тяга|row|pull|подтяг|шраг|shrug|бицепс|curl|молот|hammer|становая|deadlift|махи|raise|гир|kettle|блок|cable|pushdown|разгиб.*ног|extension|сгиб.*ног|leg.*curl|сведен|adduct/))return A.lf;if(n.match(/растяж|stretch|дыхан|breath|йога|yoga|наклон|fold|поворот|twist|кобра|cobra|дерев|tree/))return A.st;if(n.match(/скруч|crunch|велосипед|bicycle|подъём ног|leg raise|твист|twist|пресс|abs|супермен|superman/))return A.cr;return A.jp}

const bk='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>';
function t2(){return T[ln]}
function tl(){ln=ln==='ru'?'en':'ru';render()}
function stb(id){tb=id;cr=null;tStep='loc';tLoc=null;tGoal=null;tProg=null;tDay=null;render()}

function render(){
  const t=t2();
  document.getElementById('lb').textContent=t.sw;
  document.getElementById('bar').innerHTML=[
    {id:'calc',sv:'<path d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/>'},
    {id:'food',sv:'<path d="M12 3c-4.97 0-9 3.58-9 8h18c0-4.42-4.03-8-9-8zM3 13h18v1a4 4 0 01-4 4H7a4 4 0 01-4-4v-1zM3 20h18"/>'},
    {id:'train',sv:'<rect x="2" y="7" width="3" height="10" rx="1"/><rect x="19" y="7" width="3" height="10" rx="1"/><path d="M5 12h14M8 7v10M16 7v10"/>'}
  ].map(x=>`<button class="tbn ${tb===x.id?'on':''}" onclick="stb('${x.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${x.sv}</svg>${t.tabs[x.id]}</button>`).join('');
  const pg=document.getElementById('pg');
  if(tb==='calc')rCalc(pg,t);
  else if(tb==='food')cr!==null?rRD(pg,t):rFL(pg,t);
  else if(tb==='train')rTrain(pg,t);
}

// ===== CALC =====
function rCalc(pg,t){
  pg.innerHTML=`<div class="fi"><div class="card" style="margin-top:12px">
    <div style="font-family:var(--head);font-size:20px;letter-spacing:3px;margin-bottom:16px">${ln==='ru'?'ПАРАМЕТРЫ':'PARAMETERS'}</div>
    <div style="display:flex;gap:2px;margin-bottom:18px">${['m','f'].map(g=>`<button style="flex:1;padding:10px 0;font-family:var(--cond);font-size:15px;font-weight:700;letter-spacing:2px;border:1px solid ${fm.g===g?'#fff':'#333'};${fm.g===g?'background:#fff;color:#000':'color:#999'}" onclick="fm.g='${g}';render()">${t.gn[g]}</button>`).join('')}</div>
    ${[{k:'age',l:t.age,mn:14,mx:80},{k:'wt',l:t.wt,mn:35,mx:200},{k:'ht',l:t.ht,mn:120,mx:220}].map(x=>`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-family:var(--cond);font-size:11px;color:#999;letter-spacing:2px">${x.l}</span><span style="font-family:var(--head);font-size:24px">${fm[x.k]}</span></div><input type="range" min="${x.mn}" max="${x.mx}" value="${fm[x.k]}" oninput="fm.${x.k}=+this.value;render()"></div>`).join('')}
    <div style="font-family:var(--cond);font-size:11px;color:#999;letter-spacing:2px;margin-bottom:8px">${t.act.l}</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">${['sed','light','mod','high','ext'].map(a=>`<button style="padding:7px 14px;font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:1px;border:1px solid ${fm.act===a?'#fff':'#333'};${fm.act===a?'background:#fff;color:#000':'color:#999'}" onclick="fm.act='${a}';render()">${t.act[a]}</button>`).join('')}</div>
    <div style="font-family:var(--cond);font-size:11px;color:#999;letter-spacing:2px;margin-bottom:8px">${ln==='ru'?'ЦЕЛЬ':'GOAL'}</div>
    <div style="display:flex;gap:4px;margin-bottom:20px">${['lose','keep','gain'].map(g=>`<button style="flex:1;padding:10px;font-family:var(--cond);font-size:12px;font-weight:700;letter-spacing:1.5px;border:1px solid ${fm.gl===g?'#fff':'#333'};${fm.gl===g?'background:#fff;color:#000':'color:#999'}" onclick="fm.gl='${g}';render()">${t.gl[g]}</button>`).join('')}</div>
    <button style="width:100%;padding:14px;background:#fff;color:#000;font-family:var(--head);font-size:18px;letter-spacing:3px" onclick="doCalc()">${t.go}</button>
  </div>
  ${res?`<div class="card" style="margin-top:2px;animation:su .4s both;text-align:center"><div style="font-family:var(--cond);font-size:10px;color:#555;letter-spacing:3px;margin-bottom:8px">${t.dl}</div><div style="font-family:var(--head);font-size:64px;line-height:1;letter-spacing:2px">${res.kc}</div><div style="font-family:var(--cond);font-size:12px;color:#999;letter-spacing:2px;margin-bottom:16px">${t.kc}</div><div style="display:flex;gap:2px">${[{l:t.p,v:res.p},{l:t.f,v:res.f},{l:t.c,v:res.c}].map(x=>`<div style="flex:1;background:#141418;border:1px solid #1a1a22;padding:14px 6px;text-align:center"><div style="font-family:var(--head);font-size:28px">${x.v}<span style="font-size:14px;color:#999">${t.g}</span></div><div style="font-family:var(--cond);font-size:9px;color:#555;letter-spacing:2px;margin-top:4px">${x.l}</div></div>`).join('')}</div></div>`:''}</div>`;
}
function doCalc(){const{g,age,wt,ht,act,gl}=fm;let b=g==='m'?10*wt+6.25*ht-5*age+5:10*wt+6.25*ht-5*age-161;const m={sed:1.2,light:1.375,mod:1.55,high:1.725,ext:1.9};let td=Math.round(b*m[act]);let kc=gl==='lose'?td-400:gl==='gain'?td+350:td;let p=gl==='gain'?Math.round(wt*2):gl==='lose'?Math.round(wt*1.8):Math.round(wt*1.5);let f=Math.round(kc*.25/9);let c=Math.round((kc-p*4-f*9)/4);res={kc,p,f,c};render()}

// ===== FOOD =====
function rFL(pg,t){
  pg.innerHTML=`<div class="fi" style="margin-top:12px">
    <div style="display:flex;border:1px solid var(--brd);margin-bottom:14px">${['bk','ln','dn','sn'].map(m=>`<button style="flex:1;padding:9px 0;font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:1.5px;${ml===m?'background:#fff;color:#000':'color:#999'};border-right:1px solid var(--brd)" onclick="ml='${m}';render()">${t.ms[m]}</button>`).join('')}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${R[ml].map((r,i)=>`<button style="background:var(--s1);border:1px solid var(--brd);border-radius:10px;display:flex;height:90px;text-align:left;width:100%;overflow:hidden" onclick="cr=${i};render()"><img src="${r.im}" style="width:100px;min-width:100px;height:100%;object-fit:cover"><div style="padding:10px 14px;display:flex;flex-direction:column;justify-content:center;flex:1"><div style="font-family:var(--cond);font-weight:700;font-size:14px;letter-spacing:.5px;margin-bottom:4px">${r.n[ln]}</div><div style="font-size:11px;color:#999"><span style="color:#fff;font-weight:700">${r.k}</span> ${t.kc} · ${r.t}${t.tm}</div><div style="font-size:10px;color:#555;margin-top:2px">P:${r.p} F:${r.f} C:${r.c}</div></div></button>`).join('')}</div></div>`;
}
function rRD(pg,t){
  const r=R[ml][cr];
  pg.innerHTML=`<div class="fi" style="margin-top:8px">
    <button style="font-family:var(--cond);font-size:12px;letter-spacing:1.5px;padding:8px 0;display:flex;align-items:center;gap:6px;font-weight:700" onclick="cr=null;render()">${bk} ${t.ms[ml]}</button>
    <div style="border-radius:12px;overflow:hidden;margin-bottom:2px"><img src="${r.im}" style="width:100%;height:200px;object-fit:cover"></div>
    <div class="card" style="border-radius:0 0 12px 12px;border-top:none">
    <div style="font-family:var(--head);font-size:22px;letter-spacing:2px;margin-bottom:8px">${r.n[ln].toUpperCase()}</div>
    <div style="display:flex;gap:6px;margin-bottom:14px">${[r.k+' '+t.kc,r.t+t.tm,t.sv+' '+r.s].map(b=>`<span style="font-family:var(--cond);font-size:10px;padding:4px 10px;border:1px solid var(--brd);letter-spacing:1px;color:#999">${b}</span>`).join('')}</div>
    <div style="display:flex;gap:2px;margin-bottom:14px">${[{l:t.p,v:r.p},{l:t.f,v:r.f},{l:t.c,v:r.c}].map(x=>`<div style="flex:1;background:var(--s2);border:1px solid var(--brd);padding:10px 6px;text-align:center"><div style="font-family:var(--head);font-size:20px">${x.v}<span style="font-size:11px;color:#999">${t.g}</span></div><div style="font-family:var(--cond);font-size:8px;color:#555;letter-spacing:2px;margin-top:2px">${x.l}</div></div>`).join('')}</div>
    <div class="stitle">${t.ing}</div>
    ${r.i[ln].map((x,i)=>`<div style="font-size:13px;color:#999;padding:6px 0;${i<r.i[ln].length-1?'border-bottom:1px solid var(--brd)':''}">${x}</div>`).join('')}
    <div class="stitle" style="margin-top:14px">${t.hw}</div>
    ${r.h[ln].map((x,i)=>`<div style="display:flex;gap:10px;margin-bottom:6px"><span style="font-family:var(--cond);font-size:11px;color:#555;font-weight:700">${i+1}.</span><span style="font-size:13px;color:#999">${x}</span></div>`).join('')}
    </div></div>`;
}

// ===== TRAIN (multi-step) =====
function rTrain(pg,t){
  if(tDay!==null)return rDayDetail(pg,t);
  if(tProg!==null)return rProgDays(pg,t);
  if(tLoc!==null)return rProgList(pg,t);
  rLocPick(pg,t);
}

function rLocPick(pg,t){
  pg.innerHTML=`<div class="fi" style="margin-top:14px">
    <div style="font-family:var(--head);font-size:22px;letter-spacing:3px;text-align:center;margin-bottom:18px">${t.trainTitle}</div>
    <button class="pcard" style="height:180px;border-radius:12px" onclick="tLoc='gym';render()">
      <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600&h=360&fit=crop" alt="">
      <div class="overlay"></div><div class="pborder" style="background:var(--teal)"></div>
      <div class="ptext"><div class="ptitle">${t.gym}</div><div class="psub">${t.gymSub}</div></div>
    </button>
    <button class="pcard" style="height:180px;border-radius:12px" onclick="tLoc='home';render()">
      <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=600&h=360&fit=crop" alt="">
      <div class="overlay"></div><div class="pborder" style="background:var(--teal)"></div>
      <div class="ptext"><div class="ptitle">${t.home}</div><div class="psub">${t.homeSub}</div></div>
    </button>
  </div>`;
}

function rProgList(pg,t){
  const progs=P[tLoc];
  pg.innerHTML=`<div class="fi" style="margin-top:10px">
    <button style="font-family:var(--cond);font-size:12px;letter-spacing:1.5px;padding:8px 0;display:flex;align-items:center;gap:6px;font-weight:700" onclick="tLoc=null;render()">${bk} ${t.back}</button>
    <div style="font-family:var(--head);font-size:20px;letter-spacing:3px;text-align:center;margin-bottom:14px">${t.pickProg}</div>
    ${progs.map((p,i)=>`<button class="pcard" style="height:150px;border-radius:12px" onclick="tProg=${i};render()">
      <img src="${p.im}" alt="">
      <div class="overlay"></div><div class="pborder" style="background:${p.cl}"></div>
      <div class="ptext"><div class="ptitle">${p.n[ln]}</div><div class="psub">${p.ds.length} ${ln==='ru'?'дней':'days'}</div></div>
    </button>`).join('')}
  </div>`;
}

function rProgDays(pg,t){
  const prog=P[tLoc][tProg];
  pg.innerHTML=`<div class="fi" style="margin-top:10px">
    <button style="font-family:var(--cond);font-size:12px;letter-spacing:1.5px;padding:8px 0;display:flex;align-items:center;gap:6px;font-weight:700" onclick="tProg=null;render()">${bk} ${t.back}</button>
    <div style="font-family:var(--head);font-size:22px;letter-spacing:2px;margin-bottom:14px">${prog.n[ln]}</div>
    <div style="display:flex;flex-direction:column;gap:8px">${prog.ds.map((d,i)=>`<button style="background:var(--s1);border:1px solid var(--brd);border-left:3px solid ${prog.cl};border-radius:10px;padding:16px 18px;text-align:left;display:flex;justify-content:space-between;align-items:center;width:100%" onclick="tDay=${i};render()"><div><div style="font-family:var(--cond);font-size:9px;color:${prog.cl};font-weight:700;letter-spacing:2px;margin-bottom:3px">${t.day} ${d.d}</div><div style="font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:1px;margin-bottom:3px">${d.n[ln]}</div><div style="font-size:11px;color:#999;display:flex;gap:10px"><span>${d.du} ${ln==='ru'?'мин':'min'}</span><span style="color:${d.df==='h'?'var(--red)':d.df==='m'?'var(--teal)':'#3bff6f'}">${t.df[d.df]}</span><span>${d.ex.length} ${t.ex}</span></div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg></button>`).join('')}</div>
  </div>`;
}

function rDayDetail(pg,t){
  const prog=P[tLoc][tProg],d=prog.ds[tDay],cl=prog.cl;
  pg.innerHTML=`<div class="fi" style="margin-top:8px">
    <button style="font-family:var(--cond);font-size:12px;letter-spacing:1.5px;padding:8px 0;display:flex;align-items:center;gap:6px;font-weight:700" onclick="tDay=null;render()">${bk} ${t.back}</button>
    <div style="background:var(--s1);border:1px solid var(--brd);border-left:3px solid ${cl};border-radius:10px;padding:18px;margin-bottom:8px">
      <div style="font-family:var(--cond);font-size:9px;color:${cl};font-weight:700;letter-spacing:3px;margin-bottom:4px">${t.day} ${d.d} · ${tLoc==='home'?'🏠':'🏋️'}</div>
      <div style="font-family:var(--head);font-size:24px;letter-spacing:2px;margin-bottom:4px">${d.n[ln]}</div>
      <div style="font-family:var(--cond);font-size:11px;color:#999;letter-spacing:1px">${d.du} ${ln==='ru'?'мин':'min'} · ${t.df[d.df]} · ${d.ex.length} ${t.ex}</div>
    </div>
    <div class="csm" style="border-radius:10px;margin-bottom:6px"><div class="stitle">${t.wu}</div>${d.w[ln].map(x=>`<div style="font-size:13px;color:#999;padding:4px 0">${x}</div>`).join('')}</div>
    <div class="csm" style="border-radius:10px;margin-bottom:6px"><div class="stitle" style="color:${cl}">${t.mn}</div>
      ${d.ex.map((e,i)=>`<div style="display:flex;gap:12px;align-items:center;padding:12px 0;${i<d.ex.length-1?'border-bottom:1px solid var(--brd)':''}"><div class="exan">${ga(e.n[ln])}</div><div style="flex:1"><div style="font-family:var(--cond);font-size:14px;font-weight:700;letter-spacing:.5px;margin-bottom:2px">${e.n[ln]}</div><div style="font-size:11px;color:#999">${e.s} × ${e.r} ${typeof e.r==='number'?t.rp:''}</div></div><div style="font-family:var(--cond);font-size:10px;color:#555;background:var(--s2);padding:4px 8px;border:1px solid var(--brd);border-radius:6px;letter-spacing:1px">${e.rs>0?t.rs+' '+e.rs+t.sc:'—'}</div></div>`).join('')}
    </div>
    <div class="csm" style="border-radius:10px"><div class="stitle">${t.cd}</div>${d.c[ln].map(x=>`<div style="font-size:13px;color:#999;padding:4px 0">${x}</div>`).join('')}</div></div>`;
}

render();
</script>
</body>
</html>
