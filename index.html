:root{--bg:#0A0A0E;--s1:#121216;--s2:#1A1A20;--s3:#24242C;--acc:#E8553A;--acc2:#2CB67D;--acc3:#7F5AF0;--acc4:#FFD369;--tx:#EAEAEA;--txd:#8A8A96;--txm:#50505C;--brd:#222230;--font:'Outfit',sans-serif;--serif:'Playfair Display',serif;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{display:none}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--s3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 10px rgba(232,85,58,.4)}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:var(--tx);-webkit-user-select:none;user-select:none}
button:active{transform:scale(.97)}
img{display:block}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes squat{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.75) translateY(8px)}}
@keyframes pushup{0%,100%{transform:rotate(0)}50%{transform:rotate(-8deg) translateY(4px)}}
@keyframes plank{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes run{0%,100%{transform:translateX(0) scaleX(1)}50%{transform:translateX(3px) scaleX(-1)}}
@keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes stretch{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.1)}}
.app{max-width:430px;margin:0 auto;position:relative;padding-bottom:calc(72px + var(--safe-b));min-height:100dvh}
.header{padding:20px 20px 8px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,10,14,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.logo{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:3px;color:var(--acc)}
.tag{font-size:10px;color:var(--txm);letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.lang-btn{border:1px solid var(--brd)!important;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;color:var(--txd);letter-spacing:1px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,14,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;justify-content:space-around;padding:6px 0 calc(10px + var(--safe-b));border-top:1px solid var(--brd);z-index:100}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:400;color:var(--txm);padding:6px 16px;transition:color .2s;position:relative}
.tb.on{color:var(--acc);font-weight:600}
.tb.on::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:var(--acc);border-radius:1px}
.tb svg{width:22px;height:22px}
.page{padding:0 16px 16px;min-height:72vh}
.card{background:var(--s1);border-radius:20px;padding:22px;border:1px solid var(--brd)}
.csm{background:var(--s1);border-radius:14px;padding:16px;border:1px solid var(--brd)}
.fi{animation:fi .35s ease-out both}
.ex-anim{width:48px;height:48px;border-radius:12px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ex-anim svg{width:32px;height:32px}
.loc-tog{display:flex;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:14px}
.loc-tog button{flex:1;padding:7px 0;border-radius:8px;font-size:11px;font-weight:500;color:var(--txd);transition:all .2s}
.loc-tog button.on{background:var(--s3);color:var(--tx);font-weight:700}
</style>
</head>

function getAnim(name){
const n=name.toLowerCase();
if(n.includes('присед')||n.includes('squat')||n.includes('выпад')||n.includes('lunge')||n.includes('мост')||n.includes('bridge')||n.includes('goblet')||n.includes('румын')||n.includes('roman')||n.includes('носки')||n.includes('calf'))return anims.squat;
if(n.includes('отжим')||n.includes('push')||n.includes('жим')||n.includes('bench')||n.includes('разводка')||n.includes('fly'))return anims.push;
if(n.includes('планк')||n.includes('plank')||n.includes('поза')||n.includes('pose')||n.includes('собака')||n.includes('dog')||n.includes('воин')||n.includes('warrior')||n.includes('кошка')||n.includes('cat')||n.includes('шаваса')||n.includes('savas'))return anims.plank;
if(n.includes('берпи')||n.includes('burp')||n.includes('прыж')||n.includes('jump')||n.includes('спринт')||n.includes('sprint')||n.includes('бокс')||n.includes('box')||n.includes('табат')||n.includes('tabat')||n.includes('скалолаз')||n.includes('climb'))return anims.jump;
if(n.includes('бег')||n.includes('run')||n.includes('jog')||n.includes('шаг')||n.includes('step')||n.includes('марш')||n.includes('march')||n.includes('ходь')||n.includes('walk')||n.includes('степ')||n.includes('медвеж')||n.includes('bear'))return anims.run;
if(n.includes('тяга')||n.includes('row')||n.includes('pull')||n.includes('подтяг')||n.includes('шраг')||n.includes('shrug')||n.includes('бицепс')||n.includes('curl')||n.includes('молот')||n.includes('hammer')||n.includes('становая')||n.includes('deadlift')||n.includes('пуловер')||n.includes('pullover')||n.includes('махи')||n.includes('raise')||n.includes('концентр')||n.includes('concentr'))return anims.lift;
if(n.includes('растяж')||n.includes('stretch')||n.includes('дыхан')||n.includes('breath')||n.includes('йога')||n.includes('yoga')||n.includes('наклон')||n.includes('fold')||n.includes('поворот')||n.includes('twist')||n.includes('кобра')||n.includes('cobra')||n.includes('голуб')||n.includes('pigeon')||n.includes('дерев')||n.includes('tree')||n.includes('плаван')||n.includes('swim'))return anims.stretch;
if(n.includes('скруч')||n.includes('crunch')||n.includes('велосипед')||n.includes('bicycle')||n.includes('подъём ног')||n.includes('leg raise')||n.includes('твист')||n.includes('twist')||n.includes('пресс')||n.includes('abs')||n.includes('сотня')||n.includes('hundred')||n.includes('ножниц')||n.includes('scissor')||n.includes('супермен')||n.includes('superman')||n.includes('круги')||n.includes('circle'))return anims.core;
return anims.jump;
}

function renderCalc(pg,t){
  const actKeys=['sed','light','mod','high','ext'];

  const glCols={lose:'var(--acc)',keep:'var(--acc2)',gain:'var(--acc3)'};
  pg.innerHTML=`<div class="fi"><div class="card" style="margin-top:12px">
    <div style="display:flex;gap:10px;margin-bottom:18px">
      ${['m','f'].map(g=>`<button style="flex:1;padding:10px 0;border-radius:12px;font-size:14px;font-weight:600;transition:all .2s;border:${fm.g===g?'2px':'1px'} solid ${fm.g===g?'var(--acc)':'var(--brd)'}!important;${fm.g===g?'background:var(--s2);color:var(--acc)':'color:var(--txd)'}" onclick="fm.g='${g}';render()">${t.gn[g]}</button>`).join('')}
    </div>
    ${[{k:'age',l:t.age,mn:14,mx:80},{k:'wt',l:t.wt,mn:35,mx:200},{k:'ht',l:t.ht,mn:120,mx:220}].map(x=>`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:var(--txd);font-weight:500">${x.l}</span><span style="font-size:16px;font-weight:700;color:var(--acc);font-family:var(--serif)">${fm[x.k]}</span></div><input type="range" min="${x.mn}" max="${x.mx}" value="${fm[x.k]}" oninput="fm.${x.k}=+this.value;render()"></div>`).join('')}
    <div style="font-size:12px;color:var(--txd);margin-bottom:8px;font-weight:500">${t.act.l}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${actKeys.map(a=>`<button style="padding:8px 16px;border-radius:20px;font-size:12px;font-weight:${fm.act===a?600:400};background:${fm.act===a?'var(--acc2)':'transparent'};color:${fm.act===a?'#0A0A0E':'var(--txd)'}" onclick="fm.act='${a}';render()">${t.act[a]}</button>`).join('')}</div>
    <div style="font-size:12px;color:var(--txd);margin-bottom:8px;font-weight:500">${ln==='ru'?'Цель':'Goal'}</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">${glKeys.map(g=>`<button style="flex:1;padding:10px 0;border-radius:20px;font-size:12px;font-weight:${fm.gl===g?600:400};background:${fm.gl===g?glCols[g]:'transparent'};color:${fm.gl===g?'#0A0A0E':'var(--txd)'}" onclick="fm.gl='${g}';render()">${t.gl[g]}</button>`).join('')}</div>
    <button style="width:100%;padding:14px;border-radius:12px;background:var(--acc);color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px" onclick="doCalc()">${t.go}</button>
  </div>
  ${res?`<div class="card" style="margin-top:16px;animation:su .4s ease-out both"><div style="text-align:center;margin-bottom:18px"><div style="font-size:11px;color:var(--txm);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${t.dl}</div><div style="font-size:52px;font-weight:800;font-family:var(--serif);color:var(--acc);line-height:1">${res.kc}</div><div style="font-size:13px;color:var(--txd);margin-top:4px">${t.kc}</div></div><div style="display:flex;gap:8px">${[{l:t.p,v:res.p,cl:'var(--acc3)'},{l:t.f,v:res.f,cl:'var(--acc)'},{l:t.c,v:res.c,cl:'var(--acc2)'}].map(x=>`<div style="flex:1;background:var(--s2);border-radius:14px;padding:14px 8px;text-align:center;border-top:3px solid ${x.cl}"><div style="font-size:22px;font-weight:700;font-family:var(--serif)">${x.v}<span style="font-size:12px;font-weight:400;color:var(--txd)">${t.g}</span></div><div style="font-size:10px;color:var(--txd);margin-top:4px;text-transform:uppercase;letter-spacing:1px">${x.l}</div></div>`).join('')}</div></div>`:''}</div>`;
}
function doCalc(){
  const{g,age,wt,ht,act,gl}=fm;
  let bmr=g==='m'?10*wt+6.25*ht-5*age+5:10*wt+6.25*ht-5*age-161;
  const m={sed:1.2,light:1.375,mod:1.55,high:1.725,ext:1.9};
  let td=Math.round(bmr*m[act]);
  let kc=gl==='lose'?td-400:gl==='gain'?td+350:td;
  let p=gl==='gain'?Math.round(wt*2):gl==='lose'?Math.round(wt*1.8):Math.round(wt*1.5);
  let f=Math.round(kc*.25/9);
  let c=Math.round((kc-p*4-f*9)/4);
  res={kc,p,f,c};render();
}

    <div class="loc-tog"><button class="${loc==='home'?'on':''}" onclick="loc='home';render()">🏠 ${t.home}</button><button class="${loc==='gym'?'on':''}" onclick="loc='gym';render()">🏋️ ${t.gym}</button></div>
    <div style="display:flex;gap:8px;margin-bottom:18px">${gks.map(g=>{const a=wg===g;return`<button style="flex:1;padding:10px 0;border-radius:12px;font-size:12px;font-weight:600;border:${a?'2px':'1px'} solid ${a?wk[g].cl:'var(--brd)'}!important;color:${a?wk[g].cl:'var(--txd)'};background:${a?wk[g].cl+'15':'transparent'}" onclick="wg='${g}';render()">${wk[g].ic} ${t.gs[g]}</button>`}).join('')}</div>
    <div style="display:flex;flex-direction:column;gap:10px">${wk[wg].ds.map((d,i)=>`<button style="background:var(--s1);border-radius:14px;padding:16px 18px;text-align:left;display:flex;justify-content:space-between;align-items:center;border-left:3px solid ${wk[wg].cl};width:100%" onclick="wd=${i};render()"><div><div style="font-size:10px;color:${wk[wg].cl};font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px">${t.dy} ${d.d}</div><div style="font-weight:600;font-size:15px;margin-bottom:4px">${d.n[ln]}</div><div style="font-size:11px;color:var(--txd);display:flex;gap:10px"><span>${d.du} ${ln==='ru'?'мин':'min'}</span><span style="color:${d.df==='h'?'var(--acc)':d.df==='m'?'var(--acc4)':'var(--acc2)'}">${t.df[d.df]}</span><span>${d.ex.length} ${t.ex}</span></div></div>${ch}</button>`).join('')}</div></div>`;
}

function renderDayDetail(pg,t){
  const wk=W[loc];
  const d=wk[wg].ds[wd],cl=wk[wg].cl;
  pg.innerHTML=`<div class="fi" style="margin-top:8px">
    <button style="color:var(--acc);font-size:13px;padding:8px 0;display:flex;align-items:center;gap:6px;font-weight:500" onclick="wd=null;render()">${bk} ${t.gs[wg]}</button>
    <div style="background:linear-gradient(135deg,${cl}20,var(--s1));border-radius:18px;padding:20px;margin-bottom:14px;border-left:3px solid ${cl};border:1px solid var(--brd)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:10px;color:${cl};font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">${t.dy} ${d.d} · ${loc==='home'?'🏠':'🏋️'} ${t[loc]}</div>
          <div style="font-size:22px;font-weight:700;font-family:var(--serif);margin-bottom:6px;line-height:1.2">${d.n[ln]}</div>
          <div style="font-size:12px;color:var(--txd)">${d.du} ${ln==='ru'?'мин':'min'} · ${t.df[d.df]} · ${d.ex.length} ${t.ex}</div>
        </div>
      </div>
    </div>
    <div class="csm" style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--acc2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px">${t.wu}</div>
      ${d.w[ln].map(x=>`<div style="font-size:13px;color:var(--txd);padding:5px 0">${x}</div>`).join('')}
    </div>
    <div class="csm" style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:${cl};margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px">${t.mn}</div>
      ${d.ex.map((e,i)=>`<div style="display:flex;gap:12px;align-items:center;padding:12px 0;${i<d.ex.length-1?'border-bottom:1px solid var(--brd)':''}">
        <div class="ex-anim">${getAnim(e.n[ln])}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600;margin-bottom:2px">${e.n[ln]}</div><div style="font-size:11px;color:var(--txd)">${e.s} × ${e.r} ${typeof e.r==='number'?t.rp:''}</div></div>
        <div style="font-size:10px;color:var(--txm);background:var(--s2);padding:4px 10px;border-radius:8px;white-space:nowrap">${e.rs>0?t.rs+' '+e.rs+t.sc:'—'}</div>
      </div>`).join('')}
    </div>
    <div class="csm">
      <div style="font-size:11px;font-weight:700;color:var(--acc2);margin-bottom:10px;text-transform:uppercase;letter-spacing:1.5px">${t.cd}</div>
      ${d.c[ln].map(x=>`<div style="font-size:13px;color:var(--txd);padding:5px 0">${x}</div>`).join('')}
    </div></div>`;
}

render();
</script>
</body>
</html>
